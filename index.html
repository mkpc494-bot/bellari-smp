<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bellari SMP</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  color:white;
  background:url('https://wallpapercave.com/wp/wp2757874.jpg') center/cover fixed;
}

/* DARK OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  z-index:-1;
}

/* NAVBAR */
nav{
  position:fixed;
  width:100%;
  padding:15px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(8px);
}
nav h2{
  font-family:'Press Start 2P';
  font-size:14px;
  color:#4cff4c;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-family:'Press Start 2P';
  font-size:40px;
  color:#4cff4c;
  text-shadow:0 0 20px #4cff4c;
}

.hero p{margin:10px 0;}

.btn{
  padding:12px 25px;
  margin:10px;
  border:none;
  background:#4cff4c;
  color:black;
  cursor:pointer;
  font-weight:bold;
  border-radius:6px;
}

.btn:hover{
  box-shadow:0 0 15px #4cff4c;
}

/* CARDS */
.section{
  padding:80px 20px;
  text-align:center;
}

.card{
  display:inline-block;
  width:220px;
  margin:10px;
  padding:20px;
  background:rgba(0,0,0,0.6);
  border:2px solid #4cff4c;
  border-radius:8px;
}

.card:hover{
  box-shadow:0 0 15px #4cff4c;
}

/* TEAM */
.team span{
  color:#4cff4c;
  font-weight:bold;
}

footer{
  padding:20px;
  background:black;
}
</style>
</head>

<body>

<div class="overlay"></div>

<nav>
  <h2>BELLARI SMP</h2>
</nav>

<div class="hero">
  <h1>BELLARI SMP</h1>
  <p>High-Speed Minecraft SMP Server</p>
  <p id="status">Checking server...</p>
  <p>IP: power.hexacraft.fun:25579</p>

  <button class="btn" onclick="copyIP()">Copy IP</button>
  <button class="btn" onclick="window.location.href='https://discord.com/channels/1358422608118288576/1478640801968820344'">Discord</button>
  <button class="btn" onclick="window.location.href='https://www.youtube.com/@ObsiVortex'">YouTube</button>
</div>

<div class="section">
  <h2>Features</h2>
  <div class="card">100 Player Slots</div>
  <div class="card">Java + Bedrock</div>
  <div class="card">Smooth Gameplay</div>
  <div class="card">Malayalam Community</div>
</div>

<div class="section team">
  <h2>Team</h2>
  <p>👑 Owners: <span>PowerKingsYT</span>, <span>ObsiVortex</span></p>
  <p>⚙ Developers: <span>Practice</span>, <span>MKPC</span></p>
</div>

<footer>
  <p>© Bellari SMP</p>
</footer>

<script>
fetch("https://api.mcsrvstat.us/2/power.hexacraft.fun:25579")
.then(r=>r.json())
.then(d=>{
 document.getElementById("status").innerText=
 d.online ? "🟢 Online - "+d.players.online+" players"
 : "🔴 Offline";
});

function copyIP(){
 navigator.clipboard.writeText("power.hexacraft.fun:25579");
 alert("IP Copied!");
}
</script>

</body>
</html>
